<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neko Soluciones – Producción</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--text-primary:#0f172a;--text-secondary:#64748b;--text-muted:#94a3b8;--blue:#2563eb;--blue-light:#eff6ff;--blue-mid:#bfdbfe;--red:#ef4444;--red-light:#fff1f2;--red-border:#fca5a5;--green:#10b981;--green-light:#ecfdf5;--green-border:#6ee7b7;--amber:#f59e0b;--amber-light:#fffbeb;--purple:#7c3aed;--purple-light:#f5f3ff;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--radius:14px;--radius-sm:8px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(37,99,235,.3);}
  .topbar h1{font-size:16px;font-weight:800;}.topbar h1 span{color:var(--blue);}
  .area-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .user-info{font-size:13px;font-weight:600;color:var(--text-secondary);}
  .btn-sm{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-secondary);transition:background .2s;}
  .btn-sm:hover{background:var(--border);}
  .btn-sm.blue{background:var(--blue-light);color:var(--blue);border-color:var(--blue-mid);}
  .main{padding:24px;max-width:1000px;margin:0 auto;}
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);}
  .stat-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;}
  .stat-value{font-size:26px;font-weight:800;margin-top:4px;font-family:'JetBrains Mono',monospace;}
  .stat-value.blue{color:var(--blue);}.stat-value.amber{color:var(--amber);}.stat-value.green{color:var(--green);}
  .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px;margin-bottom:20px;box-shadow:var(--shadow-sm);}
  .tab{flex:1;padding:8px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .2s;}
  .tab:hover{background:var(--surface2);}
  .tab.active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
  .prendas-list{display:flex;flex-direction:column;gap:12px;}
  .prenda-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;transition:box-shadow .2s;}
  .prenda-card.priority{border-left:4px solid var(--red);}
  .urgente{border-left:4px solid #ea580c;border-top:2px solid #ea580c;animation:pulseCard 1.5s infinite;}
  .marketplace{border-left:4px solid #ca8a04;border-top:2px solid #ca8a04;}
  @keyframes pulseCard{0%,100%{box-shadow:0 4px 16px rgba(234,88,12,.15);}50%{box-shadow:0 4px 24px rgba(234,88,12,.4);}}
  .prenda-card.en-proceso{border-left:4px solid var(--amber);}
  .prenda-card.lista{border-left:4px solid var(--green);}
  .prenda-header{padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;background:var(--surface2);border-bottom:1px solid var(--border);}
  .prenda-header-left{display:flex;flex-direction:column;gap:4px;}
  .prenda-orden{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--blue);}
  .prenda-nombre{font-size:15px;font-weight:800;color:var(--text-primary);}
  .prenda-tags{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap;}
  .ptag{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
  .ptag-gray{background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);}
  .ptag-blue{background:var(--blue-light);border:1px solid var(--blue-mid);color:var(--blue);}
  .ptag-red{background:var(--red-light);border:1px solid var(--red-border);color:var(--red);}
  .ptag-amber{background:var(--amber-light);color:var(--amber);}
  .ptag-purple{background:var(--purple-light);border:1px solid #ede9fe;color:var(--purple);}
  .estado-badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
  .estado-pendiente{background:var(--blue-light);color:var(--blue);}
  .estado-proceso{background:var(--amber-light);color:var(--amber);}
  .estado-lista{background:var(--green-light);color:var(--green);}
  .prenda-body{padding:16px 18px;}
  .prenda-notas{font-size:13px;color:#92400e;background:var(--amber-light);padding:8px 12px;border-radius:6px;border-left:3px solid var(--amber);margin-bottom:12px;}
  .prenda-url{font-size:13px;margin-bottom:12px;}
  .prenda-url a{color:var(--blue);font-weight:600;}
  .flujo-wrap{margin-bottom:14px;padding:10px 14px;background:var(--blue-light);border-radius:var(--radius-sm);border:1px solid var(--blue-mid);display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
  .flujo-chip{padding:3px 10px;background:var(--surface);border:1px solid var(--blue-mid);border-radius:20px;font-size:11px;font-weight:700;color:var(--blue);white-space:nowrap;}
  .flujo-chip.current{background:var(--blue);color:#fff;}
  .flujo-chip.done{background:var(--green-light);color:var(--green);border-color:var(--green-border);}
  .flujo-chip.pending{background:var(--surface2);color:var(--text-muted);border-color:var(--border);}
  .flujo-arr{font-size:11px;color:var(--text-muted);}
  .error-alert{margin-bottom:12px;background:var(--red-light);border:1px solid var(--red-border);border-left:3px solid var(--red);border-radius:6px;padding:10px 12px;}
  .error-alert-title{font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
  .error-alert-desc{font-size:12px;color:#7f1d1d;}
  .diseno-estados{margin-bottom:14px;}
  .diseno-label{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .diseno-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .diseno-btn{padding:8px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text-secondary);}
  .diseno-btn.active-diseno{background:var(--purple);color:#fff;border-color:var(--purple);}
  .diseno-btn.active-imprimiendo{background:var(--amber);color:#fff;border-color:var(--amber);}
  .diseno-btn.active-impreso{background:var(--green);color:#fff;border-color:var(--green);}
  .prenda-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-action{padding:9px 16px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform .15s,opacity .2s;}
  .btn-action:hover{transform:translateY(-1px);}
  .btn-action:active{transform:translateY(0);}
  .btn-action:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-iniciar{background:var(--amber-light);color:var(--amber);border:1.5px solid #fcd34d;}
  .btn-listo{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 3px 10px rgba(16,185,129,.3);}
  .btn-enviar{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 3px 10px rgba(37,99,235,.3);}
  .btn-error{background:var(--red-light);color:var(--red);border:1.5px solid var(--red-border);}
  .pause-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding:10px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;}
  .pause-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;width:100%;margin-bottom:2px;}
  .btn-pausa{padding:7px 12px;border:1.5px solid #fed7aa;background:#fff7ed;color:#c2410c;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
  .btn-pausa:hover{background:#ffedd5;}
  .btn-reanudar{padding:9px 18px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(16,185,129,.3);}
  .pausa-activa{background:#fffbeb;border:2px solid #fcd34d;border-radius:10px;padding:10px 14px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .pausa-info{font-size:13px;font-weight:700;color:#92400e;}
  /* PAGINACIÓN */
  .paginacion{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;}
  .btn-pag{padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
  .btn-pag:hover{border-color:var(--blue);color:var(--blue);}
  .btn-pag.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn-pag:disabled{opacity:.4;cursor:not-allowed;}
  .pag-info{font-size:13px;color:var(--text-muted);font-weight:600;}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:28px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
  .modal h3{font-size:17px;font-weight:800;margin-bottom:6px;}
  .modal p{font-size:13px;color:var(--text-secondary);margin-bottom:18px;}
  .modal textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;background:var(--surface2);resize:vertical;min-height:80px;outline:none;margin-bottom:16px;}
  .modal textarea:focus{border-color:var(--red);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .btn-cancel{padding:9px 16px;background:var(--surface2);color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;}
  .btn-confirm-error{padding:9px 16px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;}
  .state-box{text-align:center;padding:60px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .state-box .icon{font-size:40px;margin-bottom:12px;}
  .state-box p{font-size:15px;font-weight:600;color:var(--text-secondary);}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
  @media(max-width:600px){.stats-bar{grid-template-columns:1fr 1fr;}.prenda-actions{flex-direction:column;}}
  @keyframes parpadeo {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }
  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">🐱</div>
    <h1>Neko <span>Soluciones</span></h1>
    <span class="area-badge" id="area-badge">Cargando...</span>
  </div>
  <div class="topbar-right">
    <span class="user-info" id="user-info"></span>
    <span id="badge-aprobacion-diseno" style="display:none;background:#f97316;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-right:8px"></span><button class="btn-sm blue" onclick="_primerasCarga=true; _estadosAprobacion={}; cargar()">🔄 Actualizar</button>
    <button class="btn-sm" onclick="cerrarSesion()">🚪 Salir</button>
  </div>
</div>
<div class="main">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value blue" id="stat-pendientes">—</div></div>
    <div class="stat-card"><div class="stat-label">En Proceso</div><div class="stat-value amber" id="stat-proceso">—</div></div>
    <div class="stat-card"><div class="stat-label">Listas</div><div class="stat-value green" id="stat-listas">—</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-pendientes" onclick="cambiarTab('pendientes')">📥 Pendientes</button>
    <button class="tab" id="tab-proceso" onclick="cambiarTab('proceso')">⚙️ En Proceso</button>
    <button class="tab" id="tab-listas" onclick="cambiarTab('listas')">✅ Listas</button>
    <button class="tab" id="tab-errores" onclick="cambiarTab('errores')">🔴 Errores <span id="badge-errores" style="display:none;background:#ef4444;color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;margin-left:3px">0</span></button>
  </div>
  <div id="container">
    <div class="state-box"><div class="icon">⏳</div><p>Cargando prendas...</p></div>
  </div>
  <div class="paginacion" id="paginacion" style="display:none"></div>
</div>

<div class="modal-overlay" id="modal-error">
  <div class="modal">
    <h3>🔴 Reportar Error</h3>
    <p>Describe el problema. La prenda será devuelta al área anterior para corrección.</p>
    <textarea id="error-desc" placeholder="Ej: El diseño tiene el color incorrecto..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm-error" onclick="confirmarError()">🔴 Reportar y Devolver</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
  const SB_URL = 'https://umlzaupnuvarrnakcbdo.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtbHphdXBudXZhcnJuYWtjYmRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTM4NTYsImV4cCI6MjA4OTg2OTg1Nn0.7Z5q3vvAIGDKFmjMjt6kra-3wHxNHyNjTfEj8GamdFA';
  const HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

  const RUTAS = {
    'Ruta 1': ['Ventas','Análisis','Diseño','Sublimación','Corte','Confección','Terminación','Almacén'],
    'Ruta 2': ['Ventas','Análisis','Corte','Confección','Terminación','Almacén'],
    'Ruta 3': ['Ventas','Análisis','Compras','Diseño','Estampado','Almacén'],
    'Ruta 4': ['Análisis','Diseño','Sublimación','Almacén'],
    'Ruta 5': ['Ventas','Análisis','Diseño','Confección','Bordado','Terminación','Almacén'],
    'Ruta 6': ['Ventas','Análisis','Diseño','Bordado','Confección','Terminación','Almacén'],
    // Rutas de servicios rápidos de caja (van directo al área → Almacén)
    'Servicio': ['Sublimación','Almacén'],
    'Servicio-Diseno': ['Diseño','Almacén'],
    'Servicio-Corte': ['Corte','Almacén'],
    'Servicio-Confeccion': ['Confección','Almacén'],
    'Servicio-DTF': ['Estampado','Almacén'],
  };

  const AREA_CONFIG = {
    'Compras':     { icon:'🛍️', color:'#0891b2', bg:'#ecfeff' },
    'Diseño':      { icon:'🎨', color:'#7c3aed', bg:'#f5f3ff' },
    'Sublimación': { icon:'♨️', color:'#dc2626', bg:'#fff1f2' },
    'Estampado':   { icon:'🖨️', color:'#d97706', bg:'#fffbeb' },
    'Corte':       { icon:'✂️', color:'#059669', bg:'#ecfdf5' },
    'Bordado':     { icon:'🪡', color:'#db2777', bg:'#fdf2f8' },
    'Confección':  { icon:'🧵', color:'#2563eb', bg:'#eff6ff' },
    'Terminación': { icon:'✅', color:'#0d9488', bg:'#f0fdfa' },
    'Almacén':     { icon:'📦', color:'#4f46e5', bg:'#eef2ff' },
  };

  // ── ESTADO GLOBAL ────────────────────────────────────────
  let sesion      = null;
  let areaActual  = '';
  let tabActual   = 'pendientes';
  let prendas     = [];       // Solo las prendas del tab actual
  let erroresArea = [];
  let errorTarget = null;
  let pagina      = 0;
  const POR_PAG   = 20;       // Prendas por página
  let totalPrendas = { pendientes: 0, proceso: 0, listas: 0 };

  // ── INIT ─────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const raw = sessionStorage.getItem('nk_user');
    if (!raw) { window.location.href = 'neko_login.html'; return; }
    sesion = JSON.parse(raw);
    areaActual = sesion.area;


    const cfg = AREA_CONFIG[areaActual] || { icon:'⚙️', color:'#2563eb', bg:'#eff6ff' };
    document.title = 'Neko Soluciones – ' + areaActual;
    const badgeEl = document.getElementById('area-badge');
    badgeEl.textContent = cfg.icon + ' ' + areaActual;
    badgeEl.style.background = cfg.bg;
    badgeEl.style.color = cfg.color;
    document.getElementById('user-info').textContent = '👤 ' + sesion.nombre;

    cargar();
    cargarErrores();
    // Polling liviano de aprobaciones cada 25 segundos
    // Solo aplica al área Diseño — consulta únicamente el campo aprobacion_estado
    if (areaActual === 'Diseño' || esAreaDiseno(areaActual)) {
      setInterval(pollingAprobaciones, 25000);
    }
  });

  function cerrarSesion() {
    sessionStorage.removeItem('nk_user');
    window.location.href = 'neko_login.html';
  }

  // ── CARGA OPTIMIZADA: solo trae campos necesarios ────────
  async function cargar() {
    mostrarCargando();
    try {
      // Solo traer id, numero_orden, productos, sub_estados, marca, es_prioritario, fecha_entrega
      // Y filtrar por estado EN_PRODUCCION directamente en el servidor
      const url = SB_URL + '/rest/v1/ordenes'
        + '?estado=eq.EN_PRODUCCION'
        + '&select=id,numero_orden,productos,sub_estados,marca,es_prioritario,fecha_entrega,nivel_urgencia,canal,requiere_aprobacion,aprobacion_estado,aprobacion_comentario,aprobacion_url'
        + '&order=es_prioritario.desc,fecha_creacion.asc';

      const r = await fetch(url, { headers: HDR });
      if (!r.ok) throw new Error('Error HTTP ' + r.status);
      const ordenes = await r.json();

      // Verificar cambios en aprobaciones vs carga anterior
      revisarCambiosAprobacion(ordenes);

      // Extraer prendas del área actual — procesamiento eficiente
      const pendientes = [], enProceso = [], listas = [];

      ordenes.forEach(orden => {
        const prods = orden.productos || [];
        const subs  = orden.sub_estados || [];

        prods.forEach((p, idx) => {
          const se = subs.find(s => s.prenda_idx === idx);
          if (!se) return; // Sin sub_estado = no inicializada, ignorar

          // Comparar área normalizando tildes y mayúsculas
          var _normArea = function(a){ return (a||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); };
          if (_normArea(se.area_actual) !== _normArea(areaActual)) return; // No es de esta área
          // Excluir prendas con error activo — solo aparecen en pestaña Errores
          if (se.estado === 'error') return;

          // En Diseño: filtrar solo las prendas asignadas a este usuario
          if (esAreaDiseno(areaActual)) {
            const disenAsig = (se.diseñador_asignado || '').trim().toLowerCase();
            const usuActual  = (sesion.usuario || sesion.nombre || '').trim().toLowerCase();
            // Si tiene diseñador asignado y no es el usuario actual, ignorar
            if (disenAsig && disenAsig !== usuActual) return;
          }

          const item = {
            ordenId:      orden.id,
            ordenNum:     orden.numero_orden,
            prendaIdx:    idx,
            prenda:       p,
            ruta:         RUTAS[p.ruta] || (p.ruta === 'Servicio' ? [areaActual, 'Almacén'] : []),
            marca:        orden.marca || '',
            esPrioritario: orden.es_prioritario,
            nivelUrgencia: orden.nivel_urgencia || 'normal',
            canal:         orden.canal || '',
            entrega:      orden.fecha_entrega,
            estado:       se.estado || 'pendiente',
            estadoDiseno: se.estado_diseno || 'diseno',
            tieneError:        !!(se.error_desc),
            errorAreaReporta:  se.error_area || '',
            errorDesc:         se.error_desc || '',
            diseñadorAsignado:   se.diseñador_asignado || '',
            requiereAprobacion:  orden.requiere_aprobacion || false,
            aprobacionEstado:    orden.aprobacion_estado || null,
            aprobacionComentario:orden.aprobacion_comentario || '',
            pausaMotivo:       se.pausa_motivo || '',
            enPausa:           se.pausa_motivo ? true : false,
            reqAprobacion:     orden.requiere_aprobacion || false,
            aprobEstado:       orden.aprobacion_estado || null,
            aprobComentario:   orden.aprobacion_comentario || '',
            // Guardar sub para actualizaciones locales
            _subs:        subs,
            _ordenId:     orden.id,
          };

          if (se.estado === 'pendiente')  pendientes.push(item);
          else if (se.estado === 'en_proceso') enProceso.push(item);
          else if (se.estado === 'lista') listas.push(item);
        });
      });

      // Guardar totales
      totalPrendas = {
        pendientes: pendientes.length,
        proceso:    enProceso.length,
        listas:     listas.length,
      };

      // Guardar todas separadas para paginación
      // Ordenar: urgente → marketplace → prioritario → normal
      function sortUrgencia(arr) {
        const ord = { urgente: 0, marketplace: 1, prioritario: 2, normal: 3 };
        return arr.sort((a,b) => (ord[a.nivelUrgencia]||3) - (ord[b.nivelUrgencia]||3));
      }
      window._pendientes = sortUrgencia(pendientes);
      window._proceso    = sortUrgencia(enProceso);
      window._listas     = listas;

      actualizarStats();
      renderTab();

    } catch(e) {
      document.getElementById('container').innerHTML =
        '<div class="state-box"><div class="icon">❌</div><p>' + e.message + '</p></div>';
    }
  }

  // ── STATS ─────────────────────────────────────────────────
  function actualizarStats() {
    document.getElementById('stat-pendientes').textContent = totalPrendas.pendientes;
    document.getElementById('stat-proceso').textContent    = totalPrendas.proceso;
    document.getElementById('stat-listas').textContent     = totalPrendas.listas;
  }

  // ── TABS ──────────────────────────────────────────────────
  function cambiarTab(tab) {
    tabActual = tab;
    pagina = 0;
    ['pendientes','proceso','listas','errores'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.classList.toggle('active', t === tab);
    });
    if (tab === 'errores') {
      document.getElementById('paginacion').style.display = 'none';
      renderErrores();
    } else {
      renderTab();
    }
  }

  // ── RENDER CON PAGINACIÓN ─────────────────────────────────
  function renderTab() {
    const mapTab = {
      pendientes: window._pendientes || [],
      proceso:    window._proceso    || [],
      listas:     window._listas     || [],
    };
    const todas  = mapTab[tabActual] || [];
    const inicio = pagina * POR_PAG;
    const pagina_actual = todas.slice(inicio, inicio + POR_PAG);
    const cont   = document.getElementById('container');
    const pagDiv = document.getElementById('paginacion');

    if (!todas.length) {
      const msgs = {
        pendientes: ['📥', 'No hay prendas pendientes'],
        proceso:    ['⚙️', 'No hay prendas en proceso'],
        listas:     ['✅', 'No hay prendas listas aún'],
      };
      const [icon, msg] = msgs[tabActual];
      cont.innerHTML = '<div class="state-box"><div class="icon">' + icon + '</div><p>' + msg + '</p></div>';
      pagDiv.style.display = 'none';
      return;
    }

    cont.innerHTML = '<div class="prendas-list">' + pagina_actual.map(renderPrenda).join('') + '</div>';

    // Paginación
    const totalPags = Math.ceil(todas.length / POR_PAG);
    if (totalPags <= 1) {
      pagDiv.style.display = 'none';
    } else {
      pagDiv.style.display = 'flex';
      let html = '<button class="btn-pag" onclick="irPagina(' + (pagina-1) + ')" ' + (pagina===0?'disabled':'') + '>← Ant</button>';
      for (let i = 0; i < totalPags; i++) {
        html += '<button class="btn-pag ' + (i===pagina?'active':'') + '" onclick="irPagina(' + i + ')">' + (i+1) + '</button>';
      }
      html += '<button class="btn-pag" onclick="irPagina(' + (pagina+1) + ')" ' + (pagina>=totalPags-1?'disabled':'') + '>Sig →</button>';
      html += '<span class="pag-info">' + (inicio+1) + '–' + Math.min(inicio+POR_PAG, todas.length) + ' de ' + todas.length + '</span>';
      pagDiv.innerHTML = html;
    }
  }

  function irPagina(p) {
    pagina = p;
    renderTab();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Funciones auxiliares via data-attributes
  // Guardar URL de aprobación del arte en el producto
  async function guardarUrlAprobacion(btn) {
    var oid  = btn.getAttribute('data-oid');
    var pidx = parseInt(btn.getAttribute('data-idx'));
    var url  = document.getElementById('url-aprobacion-' + oid + '-' + pidx)?.value.trim();
    if (!url) { alert('Ingresa el enlace del arte.'); return; }
    btn.disabled = true; btn.textContent = '⏳...';
    try {
      // Leer productos de la orden y actualizar url_aprobacion de la prenda
      const r = await fetch(SB_URL + '/rest/v1/ordenes?id=eq.' + oid + '&select=productos', { headers: HDR });
      const data = await r.json();
      const prods = data[0]?.productos || [];
      if (prods[pidx]) prods[pidx].url_aprobacion = url;
      await Promise.all([
        fetch(SB_URL + '/rest/v1/ordenes?id=eq.' + oid, {
          method: 'PATCH',
          headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ productos: prods, aprobacion_estado: 'PENDIENTE', aprobacion_url: url })
        })
      ]);
      // Actualizar en memoria
      for (const arr of [window._pendientes, window._proceso, window._listas]) {
        const item = arr?.find(p => String(p.ordenId) === String(oid) && p.prendaIdx === pidx);
        if (item && item.prenda) { item.prenda.url_aprobacion = url; break; }
      }
      showToast('✅ URL enviada — Ventas verá el enlace en seguimiento');
      renderTab();
    } catch(e) {
      alert('Error: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = '💾 Guardar';
    }
  }

  function pBtnPausar(btn) {
    var oid    = btn.getAttribute('data-oid');
    var pidx   = parseInt(btn.getAttribute('data-idx'));
    var motivo = btn.getAttribute('data-motivo');
    pausarTiempo(oid, pidx, motivo);
  }
  function pBtnReanudar(btn) {
    var oid  = btn.getAttribute('data-oid');
    var pidx = parseInt(btn.getAttribute('data-idx'));
    reanudarTiempo(oid, pidx);
  }
  function pBtnCambiar(btn) { cambiarEstado(btn.getAttribute('data-oid'), parseInt(btn.getAttribute('data-idx')), btn.getAttribute('data-est')); }
  function pBtnEnviar(btn)  { enviarSiguiente(btn.getAttribute('data-oid'), parseInt(btn.getAttribute('data-idx')), btn.getAttribute('data-area')); }
  function pBtnDiseno(btn)  { cambiarEstadoDiseno(btn.getAttribute('data-oid'), parseInt(btn.getAttribute('data-idx')), btn.getAttribute('data-dis')); }
  function pBtnError(btn)   { abrirError(btn.getAttribute('data-oid'), parseInt(btn.getAttribute('data-idx'))); }

  // ── CAMBIAR ESTADO (Actualización local optimista) ────────
  async function cambiarEstado(ordenId, prendaIdx, nuevoEstado) {
    // 1. Actualizar UI inmediatamente sin esperar a Supabase
    const listas = { pendientes: window._pendientes, proceso: window._proceso, listas: window._listas };
    let item = null;
    let listaOrigen = null;

    for (const [key, arr] of Object.entries(listas)) {
      const idx = arr.findIndex(p => String(p.ordenId) === String(ordenId) && p.prendaIdx === prendaIdx);
      if (idx >= 0) { item = arr.splice(idx, 1)[0]; listaOrigen = key; break; }
    }

    if (item) {
      item.estado = nuevoEstado;
      const destino = { en_proceso: window._proceso, lista: window._listas, pendiente: window._pendientes };
      if (destino[nuevoEstado]) destino[nuevoEstado].unshift(item);
      totalPrendas = { pendientes: window._pendientes.length, proceso: window._proceso.length, listas: window._listas.length };
      actualizarStats();
      const tabDest = { en_proceso: 'proceso', lista: 'listas', pendiente: 'pendientes' }[nuevoEstado];
      if (tabDest) { tabActual = tabDest; pagina = 0; ['pendientes','proceso','listas','errores'].forEach(t => { const el = document.getElementById('tab-'+t); if(el) el.classList.toggle('active', t===tabDest); }); }
      renderTab();
      showToast(nuevoEstado === 'en_proceso' ? '⚙️ Proceso iniciado' : '✅ Prenda lista para enviar');
    }

    // 2. Guardar en Supabase en background
    actualizarSubEstado(ordenId, prendaIdx, { estado: nuevoEstado }).catch(e => {
      showToast('⚠️ Error guardando: ' + e.message);
    });

    // 3. Registro de tiempo — iniciar al entrar en proceso
    if (nuevoEstado === 'en_proceso' && item) {
      iniciarTiempo(ordenId, prendaIdx, item);
    }
  }

  // ── ESTADO DISEÑO ─────────────────────────────────────────
  async function cambiarEstadoDiseno(ordenId, prendaIdx, nuevoEstadoDiseno) {
    // Actualizar en memoria
    const arr = window._proceso || [];
    const item = arr.find(p => String(p.ordenId) === String(ordenId) && p.prendaIdx === prendaIdx);
    if (item) { item.estadoDiseno = nuevoEstadoDiseno; renderTab(); }
    showToast(nuevoEstadoDiseno === 'imprimiendo' ? '🖨️ Imprimiendo...' : nuevoEstadoDiseno === 'impreso' ? '✅ Arte impreso — puedes enviar' : '🎨 En diseño');
    // Guardar en background
    actualizarSubEstado(ordenId, prendaIdx, { estado_diseno: nuevoEstadoDiseno }).catch(() => {});
  }

  // ── ENVIAR A SIGUIENTE ÁREA ───────────────────────────────
  async function enviarSiguiente(ordenId, prendaIdx, areaSiguiente) {
    // Buscar y remover de CUALQUIER lista (Diseño envía desde en_proceso, otras áreas desde listas)
    const todasListas = [
      { key: 'listas',     arr: window._listas     || [] },
      { key: 'proceso',    arr: window._proceso     || [] },
      { key: 'pendientes', arr: window._pendientes  || [] },
    ];

    for (const { key, arr } of todasListas) {
      const idx = arr.findIndex(p => String(p.ordenId) === String(ordenId) && p.prendaIdx === prendaIdx);
      if (idx >= 0) {
        arr.splice(idx, 1);
        totalPrendas[key] = arr.length;
        break;
      }
    }

    actualizarStats();
    // Cambiar a tab pendientes para que no quede en tab vacía
    tabActual = 'pendientes';
    ['pendientes','proceso','listas','errores'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.classList.toggle('active', t === 'pendientes');
    });
    renderTab();
    showToast('📤 Prenda enviada a ' + areaSiguiente);
    // Finalizar tiempo de esta área
    finalizarTiempo(ordenId, prendaIdx);
    // Guardar en Supabase en background
    actualizarSubEstado(ordenId, prendaIdx, {
      area_actual:   areaSiguiente,
      estado:        'pendiente',
      estado_diseno: 'diseno',
      error_desc:    null,
      error_area:    null
    }).catch(() => {});
  }

  // ── MODAL ERROR ───────────────────────────────────────────
  function abrirError(ordenId, prendaIdx) {
    errorTarget = { ordenId, prendaIdx };
    document.getElementById('error-desc').value = '';
    document.getElementById('modal-error').classList.add('show');
  }
  function cerrarModal() {
    document.getElementById('modal-error').classList.remove('show');
    errorTarget = null;
  }

  async function confirmarError() {
    if (!errorTarget) return;
    const { ordenId, prendaIdx } = errorTarget;
    const desc = document.getElementById('error-desc').value.trim();
    if (!desc) { alert('Describe el problema antes de continuar.'); return; }

    // Buscar item en cualquier lista
    let item = null;
    for (const arr of [window._pendientes, window._proceso, window._listas]) {
      item = arr.find(p => String(p.ordenId) === String(ordenId) && p.prendaIdx === prendaIdx);
      if (item) break;
    }

    const ruta    = item?.ruta || [];
    const idxRuta = ruta.indexOf(areaActual);
    const areaAnt = idxRuta > 0 ? ruta[idxRuta - 1] : 'Análisis';

    // 1. Actualizar UI local inmediatamente — quitar de TODAS las listas normales
    for (const arr of [window._pendientes, window._proceso, window._listas]) {
      const i = arr.findIndex(p => String(p.ordenId) === String(ordenId) && p.prendaIdx === prendaIdx);
      if (i >= 0) { arr.splice(i, 1); break; }
    }
    totalPrendas = { pendientes: window._pendientes.length, proceso: window._proceso.length, listas: window._listas.length };
    actualizarStats();

    // 2. Cambiar a pestaña Errores
    tabActual = 'errores';
    ['pendientes','proceso','listas','errores'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.classList.toggle('active', t === 'errores');
    });

    cerrarModal();
    showToast('🔴 Error reportado — prenda en pestaña Errores');

    // 3. Guardar en BD (await para garantizar estado correcto si recarga)
    try {
      // Mover al área anterior con estado='error'
      // Así Diseño la ve en su pestaña Errores pero NO en Pendientes
      // Conservar diseñador_asignado — actualizarSubEstado usa spread {...sub[i], ...cambios}
      // así que no incluirlo si está vacío para no sobreescribir el valor existente
      const cambiosError = {
        area_actual: areaAnt,
        estado:      'error',
        error_desc:  desc,
        error_area:  areaActual,
        error_ant:   areaAnt,
        error_fecha: new Date().toISOString()
      };
      // Solo agregar diseñador si existe para no borrar el original
      if (item?.diseñadorAsignado) cambiosError.diseñador_asignado = item.diseñadorAsignado;
      await actualizarSubEstado(ordenId, prendaIdx, cambiosError);
      await fetch(SB_URL + '/rest/v1/errores_produccion', {
        method: 'POST',
        headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          orden_id:           ordenId,
          numero_orden:       item?.ordenNum || '',
          prenda_idx:         prendaIdx,
          tipo_prenda:        item?.prenda?.tipo || '',
          area_reporta:       areaActual,
          area_responsable:   areaAnt,
          descripcion:        desc,
          estado:             'PENDIENTE',
          diseñador_asignado: item?.diseñadorAsignado || ''
        })
        // Nota: el filtro por usuario usa sub_estados.diseñador_asignado como fuente principal
      });
    } catch(e) {
      showToast('⚠️ Error al guardar: ' + e.message);
    }

    // 4. Recargar errores del área
    await cargarErrores();
  }

  // ── ACTUALIZAR SUB_ESTADO (eficiente — solo lee sub_estados) ──
  async function actualizarSubEstado(ordenId, prendaIdx, cambios) {
    const r = await fetch(SB_URL + '/rest/v1/ordenes?id=eq.' + ordenId + '&select=sub_estados', { headers: HDR });
    const data = await r.json();
    let sub = data[0]?.sub_estados || [];
    const i = sub.findIndex(s => s.prenda_idx === prendaIdx);

    // Separar nulls (borrar) de valores reales (actualizar)
    let base = i >= 0 ? { ...sub[i] } : { prenda_idx: prendaIdx, area_actual: areaActual };
    Object.entries(cambios).forEach(([k, v]) => {
      if (v === null) delete base[k];   // null = eliminar la propiedad
      else if (v !== undefined) base[k] = v;  // valor real = actualizar
    });
    base.prenda_idx = prendaIdx;

    if (i >= 0) sub[i] = base;
    else sub.push(base);

    await fetch(SB_URL + '/rest/v1/ordenes?id=eq.' + ordenId, {
      method: 'PATCH',
      headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ sub_estados: sub })
    });
  }

  // ── ERRORES DEL ÁREA ──────────────────────────────────────
  async function cargarErrores() {
    try {
      const usuActual = (sesion.usuario || sesion.nombre || '').trim().toLowerCase();

      // 1. Traer errores pendientes del área
      const rE = await fetch(
        SB_URL + '/rest/v1/errores_produccion?area_responsable=eq.' + encodeURIComponent(areaActual) + '&estado=eq.PENDIENTE&order=fecha_reporte.desc&limit=100',
        { headers: HDR }
      );
      let todos = await rE.json();
      if (!Array.isArray(todos)) todos = [];

      if (!todos.length) { erroresArea = []; }
      else {
        // 2. Traer sub_estados de las órdenes involucradas para cruzar usuario
        const ordenIds = [...new Set(todos.map(e => e.orden_id))];
        const rO = await fetch(
          SB_URL + '/rest/v1/ordenes?id=in.(' + ordenIds.join(',') + ')&select=id,sub_estados',
          { headers: HDR }
        );
        const ordenes = await rO.json();
        const subMap = {};
        (Array.isArray(ordenes) ? ordenes : []).forEach(o => { subMap[o.id] = o.sub_estados || []; });

        // 3. Cruzar cada error con su sub_estado para obtener el usuario asignado
        erroresArea = todos.filter(e => {
          const subs = subMap[e.orden_id] || [];
          const se   = subs.find(s => s.prenda_idx === e.prenda_idx) || {};
          const disenAsig = (se.diseñador_asignado || e.diseñador_asignado || '').trim().toLowerCase();

          // Si tiene usuario asignado: solo el usuario que trabajó esa prenda la ve
          if (disenAsig) return disenAsig === usuActual;

          // Si NO tiene usuario asignado (área con un solo usuario): todos la ven
          return true;
        });
      }

      const badgeEl = document.getElementById('badge-errores');
      if (erroresArea.length > 0) { badgeEl.textContent = erroresArea.length; badgeEl.style.display = 'inline'; }
      else { badgeEl.style.display = 'none'; }
      if (tabActual === 'errores') renderErrores();
    } catch(e) { console.error('cargarErrores:', e); }
  }

        : '<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#fff1f2;color:#ef4444;border:1px solid #fca5a5">🔴 Pendiente</span>';

        + '<div style="padding:14px 18px;background:' + (enCorr ? '#fffbeb' : '#fff1f2') + ';border-bottom:1px solid ' + (enCorr ? '#fcd34d' : '#fecaca') + ';display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'

          + '<div style="font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Reportado por: ' + e.area_reporta + (e.diseñador_asignado ? ' &nbsp;·&nbsp; 🎨 Diseñador: <strong>' + e.diseñador_asignado + '</strong>' : '') + '</div>'

    }).join('') + '</div>';

    // Iniciar timers para los que están en corrección
    iniciarTimersError();
  }

  function formatTiempoErr(mins) {
    if (mins < 60) return mins + ' min';
    const h = Math.floor(mins/60), m = mins%60;
    return h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
  }

  function iniciarTimersError() {
    clearInterval(window._errTimer);
    window._errTimer = setInterval(function() {
      document.querySelectorAll('[id^="timer-err-"]').forEach(function(el) {
        const inicio = el.getAttribute('data-inicio');
        if (!inicio) return;
        const mins  = Math.round((new Date() - new Date(inicio)) / 60000);
        const color = mins < 30 ? '#10b981' : mins < 60 ? '#f59e0b' : '#ef4444';
        const bg    = mins < 30 ? '#ecfdf5' : mins < 60 ? '#fffbeb' : '#fff1f2';
        const bd    = mins < 30 ? '#6ee7b7' : mins < 60 ? '#fcd34d' : '#fca5a5';
        el.style.background  = bg;
        el.style.borderColor = bd;
        const span = el.querySelector('span:last-child');
        if (span) { span.textContent = formatTiempoErr(mins); span.style.color = color; }
      });
    }, 30000);
  }


  // ── Paso 1: Iniciar corrección (activa timer) ─────────────
  async function iniciarCorreccion(btn) {
    const eid = btn.getAttribute('data-eid');
    btn.disabled = true;
    try {
      await fetch(SB_URL + '/rest/v1/errores_produccion?id=eq.' + eid, {
        method: 'PATCH',
        headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          estado_correccion:       'EN_CORRECCION',
          fecha_inicio_correccion: new Date().toISOString()
        })
      });
      showToast('⚙️ Iniciaste la corrección — timer activado');
      await cargarErrores();
    } catch(e) {
      showToast('❌ Error: ' + e.message);
      btn.disabled = false;
    }
  }

  // ── Paso 2: Solucionado → enviar de vuelta al área que reportó ──
  async function solucionarError(btn) {
    const eid  = btn.getAttribute('data-eid');
    const oid  = btn.getAttribute('data-oid');
    const pidx = parseInt(btn.getAttribute('data-pidx'));
    const dest = btn.getAttribute('data-dest');
    if (!confirm('¿Confirmas que el problema fue solucionado? La prenda volverá a ' + dest + '.')) return;
    btn.disabled = true; btn.textContent = '⏳ Enviando...';
    try {
      const e = erroresArea.find(x => String(x.id) === String(eid));
      const mins = e?.fecha_inicio_correccion
        ? Math.round((new Date() - new Date(e.fecha_inicio_correccion)) / 60000)
        : 0;
      await Promise.all([
        fetch(SB_URL + '/rest/v1/errores_produccion?id=eq.' + eid, {
          method: 'PATCH',
          headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({
            estado:             'RESUELTO',
            estado_correccion:  'RESUELTO',
            fecha_correccion:   new Date().toISOString(),
            minutos_correccion: mins
          })
        }),
        actualizarSubEstado(oid, pidx, {
          area_actual: dest,
          estado:      'pendiente',
          error_desc:  null,
          error_area:  null,
          error_ant:   null,
          error_fecha: null
        })
      ]);
      clearInterval(window._errTimer);
      showToast('✅ Solucionado — prenda enviada a ' + dest);
      await cargar();
      await cargarErrores();
    } catch(e) {
      showToast('❌ Error: ' + e.message);
      btn.disabled = false; btn.textContent = '✅ Solucionado — Enviar a ' + dest;
    }
  }


  // ── UTILIDADES ────────────────────────────────────────────
  function mostrarCargando() {
    document.getElementById('container').innerHTML =
      '<div class="state-box"><div class="icon">⏳</div><p>Cargando...</p></div>';
  }

  // ── MÓDULO DE TIEMPOS ────────────────────────────────────
  // Guarda: { ordenId-prendaIdx: { id_registro, inicio } }
  var _tiemposActivos = {};
  var _timerInterval  = null;

  // ── PAUSA / REANUDAR ─────────────────────────────────────
  async function pausarTiempo(ordenId, prendaIdx, motivo) {
    var key = String(ordenId) + '-' + prendaIdx;
    var reg = _tiemposActivos[key];

    // Guardar minutos acumulados hasta ahora
    if (reg) {
      var ahora = new Date();
      reg.minutos_acumulados = (reg.minutos_acumulados || 0) + Math.round((ahora - reg.inicio) / 60000);
      reg.pausado = true;
      reg.inicio  = null; // pausado — no contamos más
    }

    // Actualizar UI de listas locales
    for (var lk of ['_pendientes','_proceso','_listas']) {
      var arr = window[lk] || [];
      var item = arr.find(function(p){ return String(p.ordenId)===String(ordenId) && p.prendaIdx===prendaIdx; });
      if (item) { item.enPausa = true; item.pausaMotivo = motivo; break; }
    }
    renderTab();
    showToast('⏸️ Pausado: ' + motivo);

    // Guardar pausa en Supabase en background
    actualizarSubEstado(ordenId, prendaIdx, { pausa_motivo: motivo, pausa_inicio: new Date().toISOString() }).catch(function(){});
  }

  async function reanudarTiempo(ordenId, prendaIdx) {
    var key = String(ordenId) + '-' + prendaIdx;
    var reg = _tiemposActivos[key];

    // Reiniciar el timer desde ahora
    if (reg) {
      reg.inicio  = new Date();
      reg.pausado = false;
    }

    // Actualizar UI
    for (var lk of ['_pendientes','_proceso','_listas']) {
      var arr = window[lk] || [];
      var item = arr.find(function(p){ return String(p.ordenId)===String(ordenId) && p.prendaIdx===prendaIdx; });
      if (item) { item.enPausa = false; item.pausaMotivo = ''; break; }
    }
    renderTab();
    showToast('▶️ Reanudado — timer activo');

    // Limpiar pausa en Supabase en background
    actualizarSubEstado(ordenId, prendaIdx, { pausa_motivo: null, pausa_inicio: null }).catch(function(){});
  }

  function iniciarTiempo(ordenId, prendaIdx, item) {
    var key   = ordenId + '-' + prendaIdx;
    var ahora = new Date();
    _tiemposActivos[key] = { inicio: ahora, ordenId: ordenId, prendaIdx: prendaIdx, dbId: null };

    // Guardar en Supabase en background
    fetch(SB_URL + '/rest/v1/tiempos_produccion', {
      method: 'POST',
      headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({
        orden_id:     ordenId,
        numero_orden: item.ordenNum || '',
        prenda_idx:   prendaIdx,
        tipo_prenda:  item.prenda ? item.prenda.tipo : '',
        area:         areaActual,
        usuario:      sesion ? sesion.nombre : '',
        fecha_inicio: ahora.toISOString(),
        estado:       'EN_PROCESO'
      })
    }).then(function(r){ return r.json(); })
      .then(function(data){
        var reg = Array.isArray(data) ? data[0] : data;
        if (reg && reg.id && _tiemposActivos[key]) {
          _tiemposActivos[key].dbId = reg.id;
        }
      }).catch(function(){});

    // Iniciar intervalo si no está corriendo (actualiza cada 30s)
    if (!_timerInterval) {
      _timerInterval = setInterval(actualizarTimers, 30000);
    }

    actualizarTimers(); // Primera actualización inmediata
  }

  function finalizarTiempo(ordenId, prendaIdx) {
    var key = ordenId + '-' + prendaIdx;
    var reg = _tiemposActivos[key];
    if (!reg) return;
    var ahora    = new Date();
    var minutos  = Math.round((ahora - reg.inicio) / 60000);
    delete _tiemposActivos[key];

    // Si no hay más activos, detener intervalo
    if (Object.keys(_tiemposActivos).length === 0 && _timerInterval) {
      clearInterval(_timerInterval);
      _timerInterval = null;
    }

    // Guardar fin en Supabase en background
    if (reg.dbId) {
      fetch(SB_URL + '/rest/v1/tiempos_produccion?id=eq.' + reg.dbId, {
        method: 'PATCH',
        headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ fecha_fin: ahora.toISOString(), minutos: minutos, estado: 'COMPLETADO' })
      }).catch(function(){});
    }
  }

  function actualizarTimers() {
    Object.keys(_tiemposActivos).forEach(function(key) {
      var reg = _tiemposActivos[key];
      if (reg.pausado || !reg.inicio) return; // no actualizar si está pausado
      var mins = (reg.minutos_acumulados || 0) + Math.round((new Date() - reg.inicio) / 60000);
      var el    = document.getElementById('timer-' + key);
      if (!el) return;
      var color     = mins < 30 ? '#10b981' : mins < 60 ? '#f59e0b' : '#ef4444';
      var bgColor   = mins < 30 ? '#ecfdf5' : mins < 60 ? '#fffbeb' : '#fff1f2';
      var bdColor   = mins < 30 ? '#6ee7b7' : mins < 60 ? '#fcd34d' : '#fca5a5';
      el.style.background   = bgColor;
      el.style.borderColor  = bdColor;
      // Actualizar solo el span del tiempo dentro del div
      var span = el.querySelector('span:last-child');
      if (span) {
        span.textContent  = formatTiempo(mins);
        span.style.color  = color;
      }
    });
  }

  function formatTiempo(mins) {
    if (mins < 60) return mins + ' min';
    var h = Math.floor(mins / 60);
    var m = mins % 60;
    return h + 'h ' + (m > 0 ? m + 'm' : '');
  }

  function getTiempoActivo(ordenId, prendaIdx) {
    var key = String(ordenId) + '-' + prendaIdx;
    var reg = _tiemposActivos[key];
    if (!reg) return null;
    if (reg.pausado || !reg.inicio) return reg.minutos_acumulados || 0;
    return (reg.minutos_acumulados || 0) + Math.round((new Date() - reg.inicio) / 60000);
  }

  // ── POLLING LIVIANO DE APROBACIONES ─────────────────────
  // Solo consulta aprobacion_estado — no recarga toda la lista
  // Se ejecuta cada 25 segundos para TODOS los diseñadores automáticamente
  async function pollingAprobaciones() {
    if (!esAreaDiseno(areaActual)) return;
    try {
      const r = await fetch(
        SB_URL + '/rest/v1/ordenes?estado=eq.EN_PRODUCCION&requiere_aprobacion=eq.true'
               + '&select=id,numero_orden,aprobacion_estado,aprobacion_comentario',
        { headers: HDR }
      );
      if (!r.ok) return;
      const ordenes = await r.json();
      if (!Array.isArray(ordenes)) return;

      var hayNuevos = false;
      ordenes.forEach(function(o) {
        var anterior = _estadosAprobacion[o.id];
        var actual   = o.aprobacion_estado;

        // Primera vez — solo registrar sin notificar
        if (anterior === undefined) {
          _estadosAprobacion[o.id] = actual;
          return;
        }

        // Cambió a APROBADO
        if (anterior !== 'APROBADO' && actual === 'APROBADO') {
          _estadosAprobacion[o.id] = actual;
          hayNuevos = true;
          mostrarAlertaAprobacion(o.numero_orden, 'APROBADO', '');
        }

        // Cambió a RECHAZADO
        if (anterior !== 'RECHAZADO' && actual === 'RECHAZADO') {
          _estadosAprobacion[o.id] = actual;
          hayNuevos = true;
          mostrarAlertaAprobacion(o.numero_orden, 'RECHAZADO', o.aprobacion_comentario || '');
        }

        _estadosAprobacion[o.id] = actual;
      });

      // Si hubo cambios recargar la lista para mostrar banners actualizados
      if (hayNuevos) cargar();

      // Actualizar badge de pendientes
      var pendientes = ordenes.filter(function(o){
        return !o.aprobacion_estado || o.aprobacion_estado === 'PENDIENTE';
      }).length;
      actualizarBadgeAprobacion(pendientes);

    } catch(e) { /* silencioso — no interrumpir al diseñador */ }
  }

  // ── NOTIFICACIONES DE APROBACIÓN ────────────────────────
  // Se activan al presionar 🔄 Actualizar — sin polling automático
  var _estadosAprobacion = {};  // cache: {ordenId: estado}
  var _primerasCarga = true;    // controla si es primera vez

  function revisarCambiosAprobacion(ordenes) {
    // Llamada desde cargar() después de traer los datos
    if (!esAreaDiseno(areaActual)) return;
    if (!Array.isArray(ordenes)) return;

    var pendientes = 0;
    var _hayNuevosRevisar = false;
    ordenes.forEach(function(o) {
      if (!o.requiere_aprobacion) return;
      var estadoAnterior = _estadosAprobacion[o.id];
      var estadoActual   = o.aprobacion_estado;

      // Contar pendientes para el badge
      if (!estadoActual || estadoActual === 'PENDIENTE') pendientes++;

      // Primera carga
      if (estadoAnterior === undefined) {
        _estadosAprobacion[o.id] = estadoActual;
        // Si ya está APROBADO o RECHAZADO al entrar, notificar igual
        // El diseñador necesita saber sin importar si es nueva sesión
        if (estadoActual === 'APROBADO') {
          mostrarAlertaAprobacion(o.numero_orden, 'APROBADO', '');
        } else if (estadoActual === 'RECHAZADO') {
          mostrarAlertaAprobacion(o.numero_orden, 'RECHAZADO', o.aprobacion_comentario || '');
        }
        return;
      }

      // Detectar cambio a APROBADO
      if (estadoAnterior !== 'APROBADO' && estadoActual === 'APROBADO') {
        _estadosAprobacion[o.id] = estadoActual;
        _hayNuevosRevisar = true;
        mostrarAlertaAprobacion(o.numero_orden, 'APROBADO', '');
      }

      // Detectar cambio a RECHAZADO
      if (estadoAnterior !== 'RECHAZADO' && estadoActual === 'RECHAZADO') {
        _estadosAprobacion[o.id] = estadoActual;
        _hayNuevosRevisar = true;
        mostrarAlertaAprobacion(o.numero_orden, 'RECHAZADO', o.aprobacion_comentario || '');
      }

      // Actualizar cache
      _estadosAprobacion[o.id] = estadoActual;
    });

    actualizarBadgeAprobacion(pendientes);
    // Recargar la lista para mostrar banners actualizados en los cards
    if (_hayNuevosRevisar) {
      _hayNuevosRevisar = false;
      setTimeout(cargar, 300);
    }
  }

  function _cerrarNotif(btn) {
    var p = btn.parentElement;
    while (p && p !== document.body) {
      if (p.style && p.style.position === 'fixed') { p.remove(); return; }
      p = p.parentElement;
    }
  }

  function mostrarAlertaAprobacion(numeroOrden, estado, comentario) {
    // Crear notificación flotante
    var div = document.createElement('div');
    var esAprobado = estado === 'APROBADO';
    div.style.cssText = 'position:fixed;top:20px;right:20px;z-index:99999;max-width:340px;width:calc(100% - 40px);'
      + 'background:' + (esAprobado ? '#ecfdf5' : '#fff1f2') + ';'
      + 'border:2px solid ' + (esAprobado ? '#6ee7b7' : '#fca5a5') + ';'
      + 'border-radius:12px;padding:16px 18px;box-shadow:0 8px 30px rgba(0,0,0,.18);'
      + 'animation:slideIn .3s ease';
    div.innerHTML = '<div style="display:flex;align-items:flex-start;gap:10px">'
      + '<span style="font-size:24px">' + (esAprobado ? '✅' : '❌') + '</span>'
      + '<div style="flex:1">'
        + '<div style="font-size:14px;font-weight:800;color:' + (esAprobado ? '#065f46' : '#991b1b') + '">'
          + (esAprobado ? 'Arte Aprobado' : 'Arte Rechazado') + ' — Orden ' + numeroOrden
        + '</div>'
        + (esAprobado
            ? '<div style="font-size:12px;color:#047857;margin-top:3px">El cliente aprobó. Ya puedes imprimir.</div>'
            : '<div style="font-size:12px;color:#b91c1c;margin-top:3px">'
                + (comentario ? 'Motivo: ' + comentario : 'Revisa los detalles en la orden.')
              + '</div>')
        + '<div style="margin-top:10px">'
          + '<button onclick="_cerrarNotif(this); cargar();" '
            + 'style="padding:6px 14px;background:' + (esAprobado ? '#10b981' : '#dc2626') + ';color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">'
            + 'Ver en lista ↗'
          + '</button>'
          + '<button onclick="_cerrarNotif(this)" '
            + 'style="padding:6px 12px;background:transparent;color:#64748b;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;cursor:pointer">'
            + 'Cerrar'
          + '</button>'
        + '</div>'
      + '</div>'
    + '</div>';
    document.body.appendChild(div);
    // Auto-quitar después de 15 segundos
    setTimeout(function(){ if(div.parentNode) div.remove(); }, 15000);
    // Intentar reproducir sonido de notificación
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = esAprobado ? 880 : 440;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }

  function actualizarBadgeAprobacion(pendientes) {
    var badge = document.getElementById('badge-aprobacion-diseno');
    if (badge) {
      badge.textContent  = pendientes > 0 ? pendientes + ' esperando aprobación' : '';
      badge.style.display= pendientes > 0 ? 'inline-block' : 'none';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(t._tid);
    t._tid = setTimeout(() => { t.style.opacity = '0'; }, 3000);
  }
</script>
